name: Scoring IA HubSpot

on:
  schedule:
    # Toutes les 4 heures
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # Permet de lancer manuellement depuis GitHub

permissions:
  contents: write

jobs:
  scoring:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scoring pipeline
        id: scoring
        continue-on-error: true
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: python main.py --score --train

      - name: Compress data
        if: always()
        run: |
          if [ -f data/scored_contacts.json ]; then
            gzip -f data/scored_contacts.json
            echo "Compressed OK"
          else
            echo "No JSON file to compress"
          fi

      - name: Commit scored data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 52428800
          git pull --rebase origin main || true
          git add data/ || true
          git diff --staged --quiet || git commit -m "Update scoring data $(date -u +'%Y-%m-%d %H:%Mh UTC')"
          git push origin main || echo "Push failed"
