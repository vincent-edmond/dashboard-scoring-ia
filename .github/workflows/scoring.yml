name: Scoring IA HubSpot

on:
  schedule:
    # Toutes les 4 heures
    - cron: '0 */4 * * *'
  workflow_dispatch:
    # Permet de lancer manuellement depuis GitHub

permissions:
  contents: write

jobs:
  scoring:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scoring pipeline
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: python main.py --score --train

      - name: Compress data
        run: gzip -f data/scored_contacts.json

      - name: Commit scored data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scored_contacts.json.gz data/insights.json data/model_v2.pkl data/scoring_history.json
          git diff --staged --quiet || git commit -m "Update scoring data $(date -u +'%Y-%m-%d %H:%Mh UTC')"
          git push
