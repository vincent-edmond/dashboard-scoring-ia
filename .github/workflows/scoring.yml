name: Scoring IA HubSpot

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      force_train:
        description: 'Re-entrainer le modele IA'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scoring:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scoring pipeline
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          DAY=$(date -u +%u)
          HOUR=$(date -u +%H)
          if [ "$DAY" = "1" ] && [ "$HOUR" = "00" ] || [ "${{ inputs.force_train }}" = "true" ]; then
            python main.py --score --train || true
          else
            python main.py --score || true
          fi

      - name: Prepare and push data
        run: |
          # Compresser si le fichier existe
          if [ -f data/scored_contacts.json ]; then
            gzip -f data/scored_contacts.json
            echo "Data compressed"
          fi

          # Commit et push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 52428800
          git pull --rebase origin main || true
          git add data/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update scoring $(date -u +'%Y-%m-%d %H:%Mh UTC')"
            git push origin main
            echo "Data pushed"
          fi
